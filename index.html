<!doctypehtml><html lang=en><head><script src="coi-serviceworker.js"></script><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>docs</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background-color:#0f0f13;color:#e2e8f0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}header{margin-bottom:20px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}.logo-container{width:70px;height:70px;border-radius:14px;overflow:hidden;border:2px solid rgba(149,95,197,.5);box-shadow:0 4px 12px rgba(0,0,0,.5)}.logo-container img{width:100%;height:100%;object-fit:cover}h1{font-size:1.8rem;font-weight:600;letter-spacing:1px;background:linear-gradient(45deg,#955fc5,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}p.subtitle{font-size:.9rem;color:#64748b;margin-top:-4px}.game-frame{position:relative;background:#000;padding:6px;border-radius:12px;box-shadow:0 0 25px rgba(149,95,197,.25),0 0 50px rgba(59,130,246,.15);border:1px solid rgba(149,95,197,.4);display:flex;flex-direction:column;align-items:center;justify-content:center}canvas{display:block;border-radius:8px;outline:0;max-width:100%;height:auto}.game-frame:fullscreen{width:100vw!important;height:100vh!important;padding:0;border:none;border-radius:0;display:flex;align-items:center;justify-content:center;background:#000}.game-frame:fullscreen canvas{max-width:100%;max-height:100%;object-fit:contain;border-radius:0}.controls-container{margin-top:15px;display:flex;align-items:center;gap:15px}.fullscreen-btn{background:linear-gradient(45deg,#955fc5,#3b82f6);color:#fff;border:none;padding:8px 18px;font-weight:600;border-radius:20px;cursor:pointer;font-size:.85rem;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 12px rgba(149,95,197,.3)}.fullscreen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(149,95,197,.5)}.fullscreen-btn:active{transform:translateY(1px)}.status-panel{font-size:.85rem;background:#1e1e24;padding:8px 16px;border-radius:20px;border:1px solid #2d2d39;display:flex;align-items:center}.dot{width:8px;height:8px;border-radius:50%;background-color:#ef4444;transition:background-color .3s ease;margin-right:8px}.dot.ready{background-color:#10b981;box-shadow:0 0 8px #10b981}#canvas:fullscreen, canvas.emscripten:fullscreen { width: 100vw !important; height: 100vh !important; object-fit: contain !important; background-color: black !important; } </style></head><body><header><div class=logo-container><img alt="Pygame++ Logo"src=icon.jpg></div><h1>docs Engine Workspace</h1><p class=subtitle>Powered using Emscripten, enjoy coding with Pygame++</p></header><div class=game-frame id=gameFrame><canvas id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas></div><div class=controls-container><button class=fullscreen-btn onclick=goFullscreen()>Enter Fullscreen</button><div class=status-panel><span id=status-dot class=dot></span> <span id=status-text>Wasm Compiling...</span></div></div><script>function goFullscreen(){var e=document.getElementById("gameFrame");e.requestFullscreen?e.requestFullscreen():e.webkitRequestFullscreen?e.webkitRequestFullscreen():e.msRequestFullscreen&&e.msRequestFullscreen()}var Module={canvas:document.getElementById("canvas"),onRuntimeInitialized:function(){document.getElementById("status-dot").classList.add("ready"),document.getElementById("status-text").innerText="Engine Online",document.getElementById("status-text").style.color="#10b981"}}</script><script async src=index.js></script><script>document.addEventListener("fullscreenchange", function() { var canvas = document.getElementById("canvas"); if (document.fullscreenElement) { canvas.style.setProperty("width", "100vw", "important"); canvas.style.setProperty("height", "100vh", "important"); canvas.style.setProperty("object-fit", "contain", "important"); } else { canvas.style.width = ""; canvas.style.height = ""; canvas.style.objectFit = ""; } });</script></body></html>
